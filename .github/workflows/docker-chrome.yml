name: Chrome

on: [workflow_call]

permissions:
  contents: read
  issues: write

jobs:
  Test:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        node-version: ['v24.14.0']
    steps:
      - uses: jfrog-fastci/fastci@v0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          create_issues_from_insights: "true"
          accept_terms: "yes"

      - uses: actions/checkout@v2

      - name: Build the base layer
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 5
          retry_wait_seconds: 30
          command: docker build --build-arg NODE_VERSION=${{ matrix.node-version }} -f ./docker/base/Dockerfile -t ghcr.io/browserless/base:${{ matrix.node-version }} .

      - name: Build the Chrome image
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 5
          retry_wait_seconds: 30
          command: docker build --build-arg VERSION=${{ matrix.node-version }} -f ./docker/chrome/Dockerfile -t ghcr.io/browserless/chrome:${{ matrix.node-version }} .

      - name: Test the Chrome image
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 5
          retry_wait_seconds: 30
          command: docker run --ipc=host -e CI=true --entrypoint ./scripts/test.sh ghcr.io/browserless/chrome:${{ matrix.node-version }}
